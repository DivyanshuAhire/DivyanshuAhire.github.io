<!DOCTYPE html>
<html>
<head>
<title>Product</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<a href="index.html">← Back</a>

<div class="product">

<img id="img">

<div>

<h2 id="name"></h2>
<p id="price"></p>
<p id="location"></p>

<button onclick="addCart()">Add To Cart</button>
<button onclick="rent()">Rent Now</button>

</div>

</div>

<script>

const p = new URLSearchParams(window.location.search);

document.getElementById("img").src = p.get("image");
document.getElementById("name").innerText = p.get("name");
document.getElementById("price").innerText = "₹"+p.get("price");
document.getElementById("location").innerText = p.get("location");

function addCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name:p.get("name"),
price:p.get("price")
});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added to cart");

}

function rent(){

alert("Rental request sent!");

}

</script>

</body>
</html>
